<!DOCTYPE html>
<html>
<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>WAMOT LAB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* (your entire existing CSS unchanged) */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* ... KEEP ALL YOUR CSS SAME ... */

/* Settings popup */
#settingsPanel {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.settings-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding:20px;
  border-radius:20px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 WAMOT</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Access Device</button>
  </div>
</div>

<div class="dashboard" id="dashboard">

  <!-- ⚙ SETTINGS BUTTON -->
  <button onclick="openSettings()" style="margin-bottom:10px;">⚙ Settings</button>

  <div class="layout">

    <div class="left">

      <div class="card">
        <h2>TDS</h2>
        <p id="tds">--</p>
        <div id="waterStatus" class="status">--</div>
      </div>

      <div class="card">
        <h2>Water Level</h2>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h2>Motor</h2>

        <div id="switchContainer" class="switch-container">
          <label class="switch">
            <input type="checkbox" id="relaySwitch" onchange="toggleRelay()">
            <span class="slider"></span>
          </label>
          <p id="switchLabel">OFF</p>
        </div>

        <div class="mode-buttons">
          <button onclick="setMode('MANUAL')">Manual</button>
          <button onclick="setMode('AUTO')">Auto</button>
        </div>

      </div>

    </div>

    <div class="right">
      <h2>📊 Water Level History</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<!-- ⚙ SETTINGS POPUP -->
<div id="settingsPanel">
  <div class="settings-card">
    <h3>Tank Settings</h3>

    <input id="tankHeightInput" type="number" placeholder="Tank Height (cm)">

    <button onclick="saveHeight()">Save</button>
    <button onclick="closeSettings()" style="margin-top:10px;">Close</button>
  </div>
</div>

<script>
let device_id = "";
let password = "";
let chart;
let manualOverride = false;

/* ---------- LOGIN ---------- */
async function login() {
  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();
  if (!data.success) return alert("Invalid login");

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
  loadHistory();
  getRelayState();
}

/* ---------- SETTINGS ---------- */
function openSettings() {
  document.getElementById("settingsPanel").style.display = "flex";
  loadHeight();
}

function closeSettings() {
  document.getElementById("settingsPanel").style.display = "none";
}

async function loadHeight() {
  const res = await fetch("/api/get-height", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();
  document.getElementById("tankHeightInput").value = data.tank_height || "";
}

async function saveHeight() {
  const height = document.getElementById("tankHeightInput").value;

  await fetch("/api/set-height", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      device_id,
      password,
      tank_height: Number(height)
    })
  });

  alert("Saved!");
  closeSettings();
}

/* ---------- DATA ---------- */
async function getData() {
  const res = await fetch("/api/get-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();

  document.getElementById("tds").innerText = data.tds ?? "--";
  document.getElementById("level").innerText = data.water_level ?? "--";

  updateWaterStatus(data.tds);
}

function updateWaterStatus(tds) {
  const status = document.getElementById("waterStatus");

  if (tds < 300) {
    status.innerText = "💧 Excellent (Drinkable)";
    status.className = "status good";
  } else if (tds < 600) {
    status.innerText = "⚠ Moderate";
    status.className = "status warn";
  } else {
    status.innerText = "❌ Not Drinkable";
    status.className = "status bad";
  }
}

/* ---------- RELAY ---------- */
async function getRelayState() {
  if (manualOverride) return;

  const res = await fetch("/api/get-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();
  updateRelayUI(data.relay || data.state);
}

function updateRelayUI(state) {
  const box = document.getElementById("switchContainer");
  const sw = document.getElementById("relaySwitch");
  const label = document.getElementById("switchLabel");

  if (state === "ON") {
    sw.checked = true;
    box.classList.remove("disabled");
    label.innerText = "ON";
  } else if (state === "OFF") {
    sw.checked = false;
    box.classList.remove("disabled");
    label.innerText = "OFF";
  } else {
    box.classList.add("disabled");
    label.innerText = "AUTO";
  }
}

function toggleRelay() {
  manualOverride = true;
  const state = document.getElementById("relaySwitch").checked ? "ON" : "OFF";
  setRelay(state);
  setTimeout(() => manualOverride = false, 3000);
}

function setMode(mode) {
  manualOverride = true;

  if (mode === "AUTO") {
    document.getElementById("switchContainer").classList.add("disabled");
    document.getElementById("switchLabel").innerText = "AUTO";
    setRelay("AUTO");
  } else {
    document.getElementById("switchContainer").classList.remove("disabled");
  }

  setTimeout(() => manualOverride = false, 3000);
}

async function setRelay(state) {
  await fetch("/api/set-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password, state })
  });
}

/* ---------- CHART ---------- */
async function loadHistory() {
  const res = await fetch("/api/get-history", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();

  const labels = data.map(d => new Date(d.created_at).toLocaleTimeString());
  const values = data.map(d => d.water_level);

  drawChart(labels, values);
}

function drawChart(labels, values) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart").getContext("2d");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Water Level",
        data: values,
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.2)",
        fill: true,
        tension: 0.4,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

/* ---------- AUTO REFRESH ---------- */
setInterval(() => {
  if (device_id) {
    getData();
    getRelayState();
  }
}, 5000);
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
